################
### MONITORS ###
################

# See https://wiki.hypr.land/Configuring/Monitors/
monitor = HDMI-A-2, 3840x2160@120, 0x0, 1.5
monitor = eDP-1, preferred, auto-right, 1.6
monitor = DP-2, preferred, auto-left, 2, transform, 1
monitor=,preferred,auto,auto


###################
### MY PROGRAMS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/

# Set programs that you use
$terminal = kitty
$fileManager = yazi
$menu = vicinae toggle

###############
### PLUGINS ###
###############
exec-once = hyprctl plugin load /run/current-system/sw/lib/libhyprsplit.so
plugin {
    hyprsplit {
        num_workspaces = 10
    }
}

xwayland {
    force_zero_scaling = true
}
env = GDK_SCALE, 2


#################
### AUTOSTART ###
#################

exec-once = waybar
exec-once = uwsm app -- vicinae server
exec-once = [workspace special:chat silent] uwsm app -- webcord
exec-once = [workspace special:chat silent] uwsm app -- missioncenter
exec-once = [workspace special:chat silent] uwsm app -- spotify
exec-once = [workspace special:chat silent] uwsm app -- chatterino
exec-once = [workspace 11 silent] uwsm app -- firefox
# exec-once = [workspace 14 silent] uwsm app -- zeditor ~/dotfiles
exec-once = [workspace 12 silent] uwsm app -- zeditor ~/projects/hsguru
exec-once = swaync

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

# exec-once = $terminal
# exec-once = nm-applet &
# exec-once = waybar & hyprpaper & firefox


#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hypr.land/Configuring/Environment-variables/

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24


